<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a1a"/>

  <!-- Left: title and tagline -->
  <text x="80" y="268"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="160" font-weight="800" letter-spacing="-6" fill="#f1f5f9">Spot</text>
  <text x="84" y="322"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="28" font-weight="500" fill="#94a3b8">Connect the dots. Fill the grid.</text>
  <circle cx="84"  cy="400" r="18" fill="#ef4444"/>
  <circle cx="130" cy="400" r="18" fill="#3b82f6"/>
  <circle cx="176" cy="400" r="18" fill="#22c55e"/>
  <circle cx="222" cy="400" r="18" fill="#eab308"/>

  <!-- Right: Level 1 board (5×5, 80px cells, origin 740,115) -->
  <rect x="740" y="115" width="400" height="400" rx="14" fill="#3a3a3a"/>
  <g stroke="#505050" stroke-width="1.5">
    <line x1="820"  y1="115" x2="820"  y2="515"/>
    <line x1="900"  y1="115" x2="900"  y2="515"/>
    <line x1="980"  y1="115" x2="980"  y2="515"/>
    <line x1="1060" y1="115" x2="1060" y2="515"/>
    <line x1="740"  y1="195" x2="1140" y2="195"/>
    <line x1="740"  y1="275" x2="1140" y2="275"/>
    <line x1="740"  y1="355" x2="1140" y2="355"/>
    <line x1="740"  y1="435" x2="1140" y2="435"/>
  </g>

  <!-- Paths (Level 1 solution) -->
  <!-- Red: (0,0)→(1,0)→(2,0)→(3,0)→(4,0)→(4,1)→(3,1) -->
  <polyline points="780,155 860,155 940,155 1020,155 1100,155 1100,235 1020,235"
    fill="none" stroke="#ef4444" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Blue: (2,1)→(1,1)→(0,1)→(0,2)→(1,2)→(2,2)→(3,2)→(4,2) -->
  <polyline points="940,235 860,235 780,235 780,315 860,315 940,315 1020,315 1100,315"
    fill="none" stroke="#3b82f6" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Green: (4,3)→(3,3)→(2,3)→(1,3)→(0,3) -->
  <polyline points="1100,395 1020,395 940,395 860,395 780,395"
    fill="none" stroke="#22c55e" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Yellow: (0,4)→(1,4)→(2,4)→(3,4)→(4,4) -->
  <polyline points="780,475 860,475 940,475 1020,475 1100,475"
    fill="none" stroke="#eab308" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Dots (drawn over paths) -->
  <circle cx="780"  cy="155" r="21" fill="#ef4444" stroke="#3a3a3a" stroke-width="4"/>
  <circle cx="1020" cy="235" r="21" fill="#ef4444" stroke="#3a3a3a" stroke-width="4"/>
  <circle cx="940"  cy="235" r="21" fill="#3b82f6" stroke="#3a3a3a" stroke-width="4"/>
  <circle cx="1100" cy="315" r="21" fill="#3b82f6" stroke="#3a3a3a" stroke-width="4"/>
  <circle cx="1100" cy="395" r="21" fill="#22c55e" stroke="#3a3a3a" stroke-width="4"/>
  <circle cx="780"  cy="395" r="21" fill="#22c55e" stroke="#3a3a3a" stroke-width="4"/>
  <circle cx="780"  cy="475" r="21" fill="#eab308" stroke="#3a3a3a" stroke-width="4"/>
  <circle cx="1100" cy="475" r="21" fill="#eab308" stroke="#3a3a3a" stroke-width="4"/>
</svg>
